# Pin third-party actions to full commit SHAs for supply-chain security.
# GitHub-owned actions (actions/*) may use version tags.
#
# The static-check battery lives in terok-util's fleet-checks.yml
# (reusable across the package family); only the repo-specific
# typecheck job stays local (see its comment for why run-typecheck
# is off).
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  checks:
    uses: terok-ai/terok-util/.github/workflows/fleet-checks.yml@v0.3.0a2
    with:
      run-typecheck: false

  # Static type checking via mypy.  Installs the package + main deps so
  # mypy can read real signatures for imported third-party types
  # (`dbus-fast`, `asyncvarlink`, …); the test group is skipped because
  # ``python-dbusmock`` transitively pulls ``dbus-python`` which needs a
  # C toolchain — unrelated to type checking ``src/``.
  typecheck:
    if: github.repository == 'terok-ai/terok-clearance'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install project + tools
        run: uv sync --locked --no-group test

      - name: Run mypy
        run: uv run --no-sync mypy src/terok_clearance/
