exclude = [
    "**/__pycache__",
    "**/tests/**",
    "build",
    "dist",
    ".venv",
    "docs",
]

source_roots = ["src"]
exact = true
forbid_circular_dependencies = true
ignore_type_checking_imports = true

# ── Module Boundaries ───────────────────────────────────────────────
#
# Wire/protocol layer:
#   _wire       — varlink interface + event/error types (asyncvarlink only)
#   _event_ingester — reader→hub unix-socket listener (stdlib only)
#
# Transport:
#   _hub        — varlink server, reader ingestion, verdict exec
#   _client     — varlink client, event callback relay
#
# Presentation:
#   _subscriber — renders events via an injected Notifier
#   _callback   — CallbackNotifier for programmatic consumers
#   _notifier   — DbusNotifier (freedesktop.Notifications)
#   _null       — NullNotifier headless fallback
#
# Leaf:
#   _constants, _protocol, _identity
#
# Entry:
#   _registry (CLI commands) → _cli

# Package root — public re-exports from every internal module.
[[modules]]
path = "terok_dbus"
depends_on = [
    { path = "terok_dbus._callback" },
    { path = "terok_dbus._client" },
    { path = "terok_dbus._hub" },
    { path = "terok_dbus._identity" },
    { path = "terok_dbus._install" },
    { path = "terok_dbus._notifier" },
    { path = "terok_dbus._null" },
    { path = "terok_dbus._protocol" },
    { path = "terok_dbus._subscriber" },
    { path = "terok_dbus._wire" },
]

# Leaf modules — zero internal deps.
[[modules]]
path = "terok_dbus._constants"
depends_on = []

[[modules]]
path = "terok_dbus._protocol"
depends_on = []

[[modules]]
path = "terok_dbus._null"
depends_on = []

[[modules]]
path = "terok_dbus._identity"
depends_on = []

[[modules]]
path = "terok_dbus._event_ingester"
depends_on = [{ path = "terok_dbus._unix_socket" }]

# Socket-hardening helpers shared by the ingester + clearance hub.
[[modules]]
path = "terok_dbus._unix_socket"
depends_on = []

# Long-running asyncio service helpers (logging + shutdown-signal wait).
[[modules]]
path = "terok_dbus._service"
depends_on = []

# Varlink interface + typed events/errors.
[[modules]]
path = "terok_dbus._wire"
depends_on = [{ path = "terok_dbus._unix_socket" }]

# DbusNotifier — freedesktop.Notifications over D-Bus.
[[modules]]
path = "terok_dbus._notifier"
depends_on = [{ path = "terok_dbus._constants" }]

# CallbackNotifier — programmatic consumer shim.
[[modules]]
path = "terok_dbus._callback"
depends_on = []

# Clearance hub — varlink server + reader ingestion + shield exec.
[[modules]]
path = "terok_dbus._hub"
depends_on = [
    { path = "terok_dbus._event_ingester" },
    { path = "terok_dbus._service" },
    { path = "terok_dbus._unix_socket" },
    { path = "terok_dbus._wire" },
]

# Clearance client — varlink consumer library.
[[modules]]
path = "terok_dbus._client"
depends_on = [{ path = "terok_dbus._wire" }]

# Event subscriber — renders events via an injected Notifier.
[[modules]]
path = "terok_dbus._subscriber"
depends_on = [
    { path = "terok_dbus._client" },
    { path = "terok_dbus._identity" },
    { path = "terok_dbus._wire" },
]

# Terminal clearance tool (uses EventSubscriber + CallbackNotifier).
[[modules]]
path = "terok_dbus._clearance"
depends_on = [
    { path = "terok_dbus._callback" },
    { path = "terok_dbus._subscriber" },
]

# Command registry (consumed by CLI and terok integration layer)
[[modules]]
path = "terok_dbus._registry"
depends_on = []

# CLI entry point
[[modules]]
path = "terok_dbus._cli"
depends_on = [{ path = "terok_dbus._registry" }]

# Systemd unit installer
[[modules]]
path = "terok_dbus._install"
depends_on = []
